<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>جدول رمضان | الوحشية 🌙</title>
    <style>
        :root {
            /* ألوان رمضانية نارية */
            --bg-color: #000000;
            --card-bg: #1C1C1E;
            --input-bg: #2C2C2E;
            --primary-gradient: linear-gradient(135deg, #FF9500, #FF2D55); /* برتقالي لوردي غامق */
            --text-main: #FFFFFF;
            --text-secondary: #98989D;
            --accent: #FF9500;
            --danger: #FF453A;
            --radius: 18px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0; padding-bottom: 120px;
            -webkit-font-smoothing: antialiased;
        }

        header {
            background: rgba(28, 28, 30, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 15px 20px;
            padding-top: max(15px, env(safe-area-inset-top));
            position: sticky; top: 0; z-index: 100;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
        }

        h1 { 
            margin: 0; font-size: 19px; font-weight: 800; letter-spacing: -0.5px;
            background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }

        .ramadan-banner {
            background: linear-gradient(90deg, #1a0b00, #2b1100);
            border: 1px solid #4a2500;
            color: #FF9500;
            padding: 12px; margin: 15px; border-radius: 12px;
            font-size: 0.9rem; font-weight: 600; text-align: center;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        
        .day-card {
            background-color: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px; margin-bottom: 25px;
            position: relative; overflow: hidden;
            border: 1px solid #2c2c2e;
        }
        
        .day-card::before {
            content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 4px;
            background: var(--primary-gradient);
        }

        .day-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 20px; color: #fff; }

        .exercise-item { margin-bottom: 30px; border-bottom: 1px solid #2c2c2e; padding-bottom: 20px; }
        .exercise-item:last-child { margin-bottom: 0; border-bottom: none; padding-bottom: 0; }

        .ex-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .ex-name { font-size: 1.1rem; font-weight: 700; color: #fff; flex: 1; margin-left: 10px; }

        .meta-info { margin-bottom: 12px; }
        
        .target-badge {
            font-size: 0.85rem; color: var(--accent);
            background: rgba(255, 149, 0, 0.15);
            padding: 4px 10px; border-radius: 6px;
            display: inline-block; font-weight: 600; cursor: pointer;
        }

        .captain-note {
            display: block; margin-top: 8px;
            font-size: 0.85rem; color: #a1a1a6;
            font-style: italic; line-height: 1.4;
            border-right: 2px solid #FF9500; padding-right: 8px;
            background: rgba(255,255,255,0.03);
            padding: 6px 8px; border-radius: 4px;
        }

        /* 3 أعمدة: جولات - وزن - عدات */
        .inputs-grid { 
            display: grid; 
            grid-template-columns: 0.8fr 1fr 0.8fr; 
            gap: 8px; 
        }
        
        input {
            width: 100%; background: var(--input-bg);
            border: none; padding: 12px 5px; border-radius: 10px;
            color: white; font-size: 15px; 
        }
        
        .input-number { text-align: center; font-weight: 600; }
        
        /* خانة الملاحظات */
        .input-note {
            grid-column: 1 / -1; 
            text-align: right; padding-right: 12px;
            font-size: 14px; background: rgba(44, 44, 46, 0.6); color: #ccc;
        }

        input:focus { outline: 2px solid var(--accent); background: #3A3A3C; }
        ::placeholder { color: #555; font-size: 0.8rem; }

        .fab-container {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 15px; padding-bottom: max(15px, env(safe-area-inset-bottom));
            background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(15px);
            border-top: 0.5px solid #333; display: flex; gap: 12px; z-index: 200;
        }

        .btn {
            border: none; padding: 16px; border-radius: 14px;
            font-weight: 700; font-size: 16px; cursor: pointer; flex: 1;
            display: flex; justify-content: center; align-items: center; gap: 8px;
            transition: 0.2s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--primary-gradient); color: white; }
        .btn-danger { background: #2C2C2E; color: var(--danger); flex: 0.3; }

        .toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            background: rgba(40, 40, 40, 0.95); padding: 25px 40px; border-radius: 20px;
            text-align: center; pointer-events: none; opacity: 0; transition: 0.3s; z-index: 1000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 1px solid #444;
        }
        .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        #configModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 300; padding: 20px; padding-top: max(30px, env(safe-area-inset-top));
        }
        textarea { width: 100%; height: 50vh; background: #1C1C1E; color: #0f0; padding: 15px; border-radius: 12px; border:none; margin-bottom: 20px; }
    </style>
</head>
<body>

<header>
    <h1>جدول رمضان 🌙🔥</h1>
    <button onclick="toggleConfig()" style="background:none; border:none; font-size:20px;">⚙️</button>
</header>

<div class="ramadan-banner">
    ✨ تقبل الله طاعتكم يا وحش
</div>

<div class="container" id="workoutContainer"></div>

<div class="fab-container">
    <button class="btn btn-danger" onclick="clearData()">🗑️</button>
    <button class="btn btn-primary" onclick="generateReport()">
        <span>نسخ التقرير</span>
        <span>📝</span>
    </button>
</div>

<div id="toast" class="toast">
    <div style="font-size: 40px; margin-bottom:10px">✅</div>
    <div style="font-weight: 800; font-size: 18px; color:white">تم النسخ</div>
</div>

<div id="configModal">
    <h2 style="color:white">تعديل الخطة</h2>
    <textarea id="jsonInput"></textarea>
    <div style="display:flex; gap:10px">
        <button class="btn btn-danger" onclick="toggleConfig()">إغلاق</button>
        <button class="btn btn-primary" onclick="loadNewPlan()">حفظ</button>
    </div>
</div>

<script>
    // --- بيانات رمضان ---
    const defaultPlan = {
        title: "جدول رمضان: الوحشية بعد الإفطار 🌙🔥",
        days: [
            {
                name: "اليوم 1: ظهر وباي (Pull)",
                exercises: [
                    { name: "Lat Pulldown (سحب عالي)", target: "70kg | 3×10", note: "ثبات ثانية بالأسفل" },
                    { name: "Chest-Supported Row", target: "75kg-80kg | 3×10", note: "الـ 70 صارت سهلة، زيد!" },
                    { name: "Machine Pullover", target: "45kg | 3×12", note: "تركيز عالاكواع" },
                    { name: "Face Pulls", target: "35kg | 4×15", note: "حركة بطيئة وتركيز" },
                    { name: "Spider Curls (باي)", target: "17.5kg-20kg | 3×10", note: "الـ 15 كانت سهلة" },
                    { name: "Hammer Curls", target: "16kg-18kg | 3×10", note: "تحكم كامل" }
                ]
            },
            {
                name: "اليوم 2: صدر وأكتاف (Push)",
                exercises: [
                    { name: "Incline DB Press", target: "26kg ثم 24kg | 8-10", note: "جولة 1 بـ 26، وجولتين بـ 24" },
                    { name: "Flat Machine Press", target: "70kg | 3×10", note: "أداء وحشي" },
                    { name: "Seated DB Press", target: "18kg | 3×10", note: "مدى حركي كامل" },
                    { name: "Lateral Raises", target: "9kg | 4×15", note: "لا تنزل عن 9 كيلو" },
                    { name: "Triceps Pushdown", target: "22.5kg | 3×12", note: "قفل الكوع ثانية تحت" }
                ]
            },
            {
                name: "اليوم 3: أرجل (Legs) - الجحيم",
                exercises: [
                    { name: "Seated Leg Press", target: "240kg | 3×12", note: "نزول بطيء 3 ثواني ⏳" },
                    { name: "Seated Leg Curl", target: "75kg | 3×12", note: "زيد الوزن" },
                    { name: "Leg Extensions", target: "115kg | 3×12", note: "حرق للأمامية" },
                    { name: "Single Leg Press", target: "65kg | 3×10", note: "لكل رجل" },
                    { name: "Calf Raises", target: "160kg | 4×20", note: "نار وشرار" }
                ]
            },
            {
                name: "اليوم 4: علوي (Upper Focus)",
                exercises: [
                    { name: "Machine Shoulder Press", target: "60kg | 3×10", note: "" },
                    { name: "Lateral Raises", target: "9kg | 5×15", note: "نحت الأكتاف (5 جولات)" },
                    { name: "Incline Machine Press", target: "65kg | 3×12", note: "" },
                    { name: "Face Pulls", target: "35kg | 3×15", note: "تكرار للتركيز" },
                    { name: "SuperSet: Bi + Tri", target: "Failure", note: "للفشل العضلي" },
                    { name: "Hanging Leg Raises", target: "Bodyweight | 3×15", note: "بطن" }
                ]
            }
        ]
    };

    let currentPlan = defaultPlan;

    window.onload = function() {
        // مفتاح جديد لرمضان
        const savedPlan = localStorage.getItem('captainSeif_Ramadan_Plan');
        if (savedPlan) currentPlan = JSON.parse(savedPlan);
        renderWorkout();
        loadUserLogs();
    };

    function renderWorkout() {
        const container = document.getElementById('workoutContainer');
        container.innerHTML = '';

        currentPlan.days.forEach((day, dayIndex) => {
            let exercisesHtml = '';
            day.exercises.forEach((ex, exIndex) => {
                exercisesHtml += `
                    <div class="exercise-item">
                        <div class="ex-header">
                            <span class="ex-name">${ex.name}</span>
                        </div>
                        
                        <div class="meta-info">
                            <div class="target-wrapper" onclick="editTarget(${dayIndex}, ${exIndex})">
                                <span class="target-badge" id="target-${dayIndex}-${exIndex}">🎯 ${ex.target}</span>
                            </div>
                            ${ex.note ? `<span class="captain-note">💬 ${ex.note}</span>` : ''}
                        </div>

                        <div class="inputs-grid">
                            <!-- جولات | وزن | عدات -->
                            <input type="number" inputmode="decimal" class="input-number" placeholder="جولات" id="s-${dayIndex}-${exIndex}" onkeyup="saveLog()">
                            <input type="number" inputmode="decimal" class="input-number" placeholder="وزن" id="w-${dayIndex}-${exIndex}" onkeyup="saveLog()">
                            <input type="text" class="input-number" placeholder="عدات" id="r-${dayIndex}-${exIndex}" onkeyup="saveLog()">
                            
                            <!-- خانة الملاحظات -->
                            <input type="text" class="input-note" placeholder="✍️ ملاحظاتك..." id="n-${dayIndex}-${exIndex}" onkeyup="saveLog()">
                        </div>
                    </div>
                `;
            });

            container.innerHTML += `
                <div class="day-card">
                    <div class="day-title">${day.name}</div>
                    ${exercisesHtml}
                </div>
            `;
        });
        
        container.innerHTML += `<div style="height: 60px;"></div>`;
    }

    function editTarget(dIndex, eIndex) {
        const currentVal = currentPlan.days[dIndex].exercises[eIndex].target;
        const newVal = prompt("تعديل الهدف:", currentVal);
        if (newVal && newVal !== currentVal) {
            document.getElementById(`target-${dIndex}-${eIndex}`).innerText = `🎯 ${newVal}`;
            currentPlan.days[dIndex].exercises[eIndex].target = newVal;
            localStorage.setItem('captainSeif_Ramadan_Plan', JSON.stringify(currentPlan));
            if (navigator.vibrate) navigator.vibrate(50);
        }
    }

    function saveLog() {
        const inputs = document.querySelectorAll('input');
        const logs = {};
        inputs.forEach(input => {
            if(input.value) logs[input.id] = input.value;
        });
        localStorage.setItem('captainSeif_Ramadan_Logs', JSON.stringify(logs));
    }

    function loadUserLogs() {
        const logs = JSON.parse(localStorage.getItem('captainSeif_Ramadan_Logs'));
        if (logs) {
            for (const [id, value] of Object.entries(logs)) {
                const el = document.getElementById(id);
                if (el) el.value = value;
            }
        }
    }

    function generateReport() {
        let report = `🌙 *تقرير تمرين رمضان* 🔥\n`;
        report += `📅 ${new Date().toLocaleDateString('ar-EG')}\n`;
        report += `------------------\n`;
        
        let hasData = false;

        currentPlan.days.forEach((day, dayIndex) => {
            let dayContent = "";
            let dayHasData = false;
            
            dayContent += `🔴 *${day.name}*\n`;
            
            day.exercises.forEach((ex, exIndex) => {
                const s = document.getElementById(`s-${dayIndex}-${exIndex}`).value;
                const w = document.getElementById(`w-${dayIndex}-${exIndex}`).value;
                const r = document.getElementById(`r-${dayIndex}-${exIndex}`).value;
                const n = document.getElementById(`n-${dayIndex}-${exIndex}`).value;
                
                if (s || w || r || n) {
                    dayHasData = true;
                    hasData = true;
                    // تنسيق: 3 جولات × 10 عدات @ 60kg
                    let line = `▪️ ${ex.name}\n   └ `;
                    if(s) line += `🔢 ${s} جولات `;
                    if(r) line += `× ${r} `;
                    if(w) line += `@ 🏋️ ${w}kg`;
                    
                    dayContent += line + `\n`;
                    if (n) dayContent += `   └ 📝 ${n}\n`;
                }
            });
            
            if(dayHasData) {
                report += dayContent + "\n";
            }
        });

        if (!hasData) {
            alert("سجل أرقامك الأول يا وحش! 🦍");
            return;
        }

        report += `⚔️ انتهى التقرير.`;

        navigator.clipboard.writeText(report).then(() => {
            const t = document.getElementById('toast');
            t.classList.add('show');
            if (navigator.vibrate) navigator.vibrate(100);
            setTimeout(() => t.classList.remove('show'), 2500);
        });
    }

    function toggleConfig() {
        const modal = document.getElementById('configModal');
        const txt = document.getElementById('jsonInput');
        if (modal.style.display === 'block') {
            modal.style.display = 'none';
        } else {
            txt.value = JSON.stringify(currentPlan, null, 4);
            modal.style.display = 'block';
        }
    }

    function loadNewPlan() {
        try {
            const newPlan = JSON.parse(document.getElementById('jsonInput').value);
            currentPlan = newPlan;
            localStorage.setItem('captainSeif_Ramadan_Plan', JSON.stringify(newPlan));
            localStorage.removeItem('captainSeif_Ramadan_Logs');
            renderWorkout();
            toggleConfig();
        } catch (e) {
            alert("خطأ في الكود");
        }
    }

    function clearData() {
        if(confirm("تصفير العدادات؟")) {
            localStorage.removeItem('captainSeif_Ramadan_Logs');
            document.querySelectorAll('input').forEach(i => i.value = '');
        }
    }
</script>

</body>
</html>
