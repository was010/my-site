<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>لوحة الوحش | كابتن سيف</title>
    <style>
        :root {
            /* الألوان الحديثة */
            --bg-color: #000000;
            --card-bg: #1C1C1E; /* لون كروت الآيفون */
            --input-bg: #2C2C2E;
            --primary-gradient: linear-gradient(135deg, #007AFF, #5856D6); /* أزرق ملكي لبنفسجي */
            --text-main: #FFFFFF;
            --text-secondary: #8E8E93;
            --accent: #0A84FF;
            --danger: #FF453A;
            --success: #30D158;
            --radius: 16px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            padding-bottom: 100px; /* مساحة للزر العائم */
            -webkit-font-smoothing: antialiased;
        }

        /* الهيدر */
        header {
            background: rgba(28, 28, 30, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 0.5px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { margin: 0; font-size: 22px; font-weight: 800; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .header-actions button {
            background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 5px;
        }

        /* الحاويات */
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }

        /* الكروت */
        .day-card {
            background-color: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .day-title {
            font-size: 1.3rem; font-weight: 700; margin-bottom: 15px;
            color: var(--text-main); display: flex; align-items: center; gap: 10px;
        }
        .day-title::before { content: ''; display: block; width: 4px; height: 20px; background: var(--primary-gradient); border-radius: 2px; }

        /* التمارين */
        .exercise-item {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 0.5px solid #38383A;
        }
        .exercise-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

        .ex-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
        .ex-name { font-size: 1rem; font-weight: 600; color: #fff; }
        
        /* زر تعديل الهدف */
        .target-wrapper {
            font-size: 0.8rem; color: var(--text-secondary);
            background: rgba(88, 86, 214, 0.15);
            padding: 4px 8px; border-radius: 6px;
            cursor: pointer; transition: 0.2s;
            display: inline-flex; align-items: center; gap: 5px;
        }
        .target-wrapper:active { opacity: 0.7; }
        .edit-icon { font-size: 10px; opacity: 0.7; }

        /* حقول الإدخال */
        .inputs-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
        
        .input-group { position: relative; }
        
        input {
            width: 100%;
            background: var(--input-bg);
            border: none;
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-size: 16px; /* يمنع الزوم التلقائي في الآيفون */
            text-align: center;
            transition: 0.3s;
            appearance: none;
        }
        input:focus {
            background: #3A3A3C;
            box-shadow: 0 0 0 2px var(--accent);
            outline: none;
        }
        ::placeholder { color: #555; font-size: 0.9rem; }

        /* الأزرار السفلية */
        .fab-container {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            padding: 15px;
            padding-bottom: max(15px, env(safe-area-inset-bottom));
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            border-top: 0.5px solid #333;
            display: flex; gap: 10px;
            z-index: 200;
        }

        .btn {
            border: none; padding: 14px; border-radius: 12px;
            font-weight: 700; font-size: 16px; cursor: pointer;
            flex: 1; transition: transform 0.1s;
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn:active { transform: scale(0.96); }
        
        .btn-primary { background: var(--primary-gradient); color: white; box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3); }
        .btn-danger { background: rgba(255, 69, 58, 0.15); color: var(--danger); flex: 0.3; }

        /* الإشعارات */
        .toast {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(50, 50, 50, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px 30px; border-radius: 16px;
            text-align: center; pointer-events: none;
            opacity: 0; transition: 0.3s; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .toast-icon { font-size: 40px; display: block; margin-bottom: 10px; }

        /* منطقة التعديل JSON */
        #configModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 300; padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
        }
        textarea {
            width: 100%; height: 60vh; background: #1C1C1E; color: #0f0;
            border: none; padding: 15px; border-radius: 12px; font-family: monospace;
            margin-bottom: 20px; font-size: 14px;
        }
    </style>
</head>
<body>

<header>
    <h1>لوحة الوحش 🦍</h1>
    <div class="header-actions">
        <button onclick="toggleConfig()">⚙️</button>
    </div>
</header>

<div class="container" id="workoutContainer">
    <!-- سيتم توليد التمارين هنا -->
</div>

<!-- الأزرار العائمة في الأسفل -->
<div class="fab-container">
    <button class="btn btn-danger" onclick="clearData()">🗑️</button>
    <button class="btn btn-primary" onclick="generateReport()">
        <span>نسخ التقرير</span>
        <span style="font-size: 1.2rem">📋</span>
    </button>
</div>

<!-- نافذة الإشعارات -->
<div id="toast" class="toast">
    <span class="toast-icon">✅</span>
    <div style="font-weight: bold; font-size: 18px">تم النسخ!</div>
    <div style="color: #ccc; font-size: 14px; margin-top:5px">جاهز للإرسال للكابتن</div>
</div>

<!-- نافذة الإعدادات -->
<div id="configModal">
    <h2 style="color:white; margin-top:0">تحديث الخطة</h2>
    <textarea id="jsonInput"></textarea>
    <div style="display:flex; gap:10px">
        <button class="btn btn-danger" onclick="toggleConfig()">إلغاء</button>
        <button class="btn btn-primary" onclick="loadNewPlan()">حفظ التعديلات</button>
    </div>
</div>

<script>
    // --- البيانات الأساسية ---
    const defaultPlan = {
        title: "برنامج التدمير الشامل 🔥",
        days: [
            {
                name: "الجمعة: دفع (Push)",
                exercises: [
                    { name: "Incline DB Press", target: "24kg | 8 عدات" },
                    { name: "Machine Press", target: "65kg | 12 عدة" },
                    { name: "Lateral Raises", target: "10kg | 15 عدة" }
                ]
            },
            {
                name: "السبت: سحب (Pull)",
                exercises: [
                    { name: "Lat Pulldown", target: "70kg | 10 عدات" },
                    { name: "Barbell Rows", target: "60kg | 10 عدات" }
                ]
            }
        ]
    };

    let currentPlan = defaultPlan;

    // --- التشغيل ---
    window.onload = function() {
        const savedPlan = localStorage.getItem('captainSeif_Plan_V2');
        if (savedPlan) currentPlan = JSON.parse(savedPlan);
        renderWorkout();
        loadUserLogs();
    };

    // --- الرسم (Rendering) ---
    function renderWorkout() {
        const container = document.getElementById('workoutContainer');
        container.innerHTML = `<div style="text-align:center; color:#555; margin-bottom:20px; font-size:12px">اضغط على الوزن المستهدف لتعديله</div>`;

        currentPlan.days.forEach((day, dayIndex) => {
            let exercisesHtml = '';
            day.exercises.forEach((ex, exIndex) => {
                exercisesHtml += `
                    <div class="exercise-item">
                        <div class="ex-header">
                            <span class="ex-name">${ex.name}</span>
                            <div class="target-wrapper" onclick="editTarget(${dayIndex}, ${exIndex})">
                                <span id="target-${dayIndex}-${exIndex}">🎯 ${ex.target}</span>
                                <span class="edit-icon">✎</span>
                            </div>
                        </div>
                        <div class="inputs-grid">
                            <input type="number" inputmode="decimal" placeholder="الوزن (kg)" id="w-${dayIndex}-${exIndex}" onkeyup="saveLog()">
                            <input type="text" placeholder="العدات" id="r-${dayIndex}-${exIndex}" onkeyup="saveLog()">
                        </div>
                    </div>
                `;
            });

            container.innerHTML += `
                <div class="day-card">
                    <div class="day-title">${day.name}</div>
                    ${exercisesHtml}
                </div>
            `;
        });
        
        // مساحة فارغة في الأسفل عشان الأزرار
        container.innerHTML += `<div style="height: 50px;"></div>`;
    }

    // --- الوظائف ---

    // 1. تعديل الهدف (Dynamic Feature)
    function editTarget(dIndex, eIndex) {
        const currentVal = currentPlan.days[dIndex].exercises[eIndex].target;
        // نستخدم prompt بسيط لكن فعال للهاتف
        const newVal = prompt("عدل الرقم المستهدف (مثلاً: 30kg | 10 عدات):", currentVal);
        
        if (newVal && newVal !== currentVal) {
            // تحديث الواجهة
            document.getElementById(`target-${dIndex}-${eIndex}`).innerText = `🎯 ${newVal}`;
            // تحديث البيانات في الذاكرة
            currentPlan.days[dIndex].exercises[eIndex].target = newVal;
            localStorage.setItem('captainSeif_Plan_V2', JSON.stringify(currentPlan));
            
            // اهتزاز بسيط (Haptic Feedback) للأجهزة الداعمة
            if (navigator.vibrate) navigator.vibrate(50);
        }
    }

    // 2. حفظ المدخلات (وزن وعدات)
    function saveLog() {
        const inputs = document.querySelectorAll('input');
        const logs = {};
        inputs.forEach(input => {
            if(input.value) logs[input.id] = input.value;
        });
        localStorage.setItem('captainSeif_Logs_V2', JSON.stringify(logs));
    }

    // 3. استرجاع المدخلات
    function loadUserLogs() {
        const logs = JSON.parse(localStorage.getItem('captainSeif_Logs_V2'));
        if (logs) {
            for (const [id, value] of Object.entries(logs)) {
                const el = document.getElementById(id);
                if (el) el.value = value;
            }
        }
    }

    // 4. توليد التقرير
    function generateReport() {
        let report = `🚀 *تقرير التمرين - ${new Date().toLocaleDateString('ar-EG')}*\n`;
        report += `------------------\n`;
        
        let hasData = false;

        currentPlan.days.forEach((day, dayIndex) => {
            let dayContent = "";
            let dayHasData = false;
            
            dayContent += `📌 *${day.name}*\n`;
            
            day.exercises.forEach((ex, exIndex) => {
                const w = document.getElementById(`w-${dayIndex}-${exIndex}`).value;
                const r = document.getElementById(`r-${dayIndex}-${exIndex}`).value;
                
                if (w || r) {
                    dayHasData = true;
                    hasData = true;
                    dayContent += `🔹 ${ex.name}\n   └ 🏋️ ${w ? w + 'kg' : '-'} | 🔢 ${r ? r : '-'}\n`;
                }
            });
            
            if(dayHasData) {
                report += dayContent + "\n";
            }
        });

        if (!hasData) {
            alert("سجل أوزانك الأول يا وحش! 🦍");
            return;
        }

        report += `⚔️ *انتهى التقرير يا كابتن*`;

        navigator.clipboard.writeText(report).then(() => {
            showToast();
        }).catch(() => {
            alert("فشل النسخ، حاول تحدد النص يدوياً");
        });
    }

    // 5. أدوات مساعدة
    function showToast() {
        const t = document.getElementById('toast');
        t.classList.add('show');
        if (navigator.vibrate) navigator.vibrate(100);
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    function toggleConfig() {
        const modal = document.getElementById('configModal');
        const txt = document.getElementById('jsonInput');
        
        if (modal.style.display === 'block') {
            modal.style.display = 'none';
        } else {
            // جلب الخطة الحالية وعرضها كنص
            txt.value = JSON.stringify(currentPlan, null, 4);
            modal.style.display = 'block';
        }
    }

    function loadNewPlan() {
        try {
            const newPlan = JSON.parse(document.getElementById('jsonInput').value);
            currentPlan = newPlan;
            localStorage.setItem('captainSeif_Plan_V2', JSON.stringify(newPlan));
            localStorage.removeItem('captainSeif_Logs_V2'); // تصفير الأرقام القديمة
            renderWorkout();
            toggleConfig();
            alert("تم تحديث الخطة بنجاح ✅");
        } catch (e) {
            alert("خطأ في كود الخطة ❌\nتأكد من الأقواس والفواصل");
        }
    }

    function clearData() {
        if(confirm("متأكد تبي تصفر كل الأوزان المسجلة؟")) {
            localStorage.removeItem('captainSeif_Logs_V2');
            document.querySelectorAll('input').forEach(i => i.value = '');
            if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
        }
    }
</script>

</body>
</html>
